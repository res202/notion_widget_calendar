<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>CodePen - Planner Mobile - Day View</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>
<!-- partial:index.partial.html -->
<script src="https://kit.fontawesome.com/c90c553a28.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"> 
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<header style="color:#fff">
  <div class="content">
  <!-- Date Nav; Clicking the Date will take you to the Day View of the Current Date -->
  <div class="activeMonth" style="display:inline">
    <span class="prev" style='margin-left:10px; cursor:pointer' onclick="selectPreviousMonth()">&#10094;</span>
    <span id="month" class="month" style='font-size:24px; margin-left:10px'></span>
    <span class="next" style='margin-left:10px; cursor:pointer' onclick="selectNextMonth()">&#10095;</span>  
  </div>
  <!-- Switch Between Daily, Monthly and Weekly Views -->

  </header>



  
<main style="color:3A3838">
  <!-- Displays current weekday, date and week in plain text and via calendar display. Active days will display in gray text, while current days will display in orange. -->
  <section class="activeDate">
    <div class="dated" style="text-align:center">
      <p id="dayOfMonth" class="dayOfMonth" style="font-weight:900; font-size:60px"></p>

      <span id="weekDay" class="weekDay"></span>, KW
      <span id="weekOfYear" class="weekOfYear"></span>
    </div>
    
  </section>



</main>
</div>
<footer style="position:fixed; width:100%; right:3px; bottom: 3px">
 
</footer>
<!-- partial -->
  <script  src="./script.js"></script>

</body>
</html>
